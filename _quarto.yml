project:
  type: website
  output-dir: _site
  preview:
    port: 4200
    browser: true

website:
  title: "Matthew Zhou"
  description: "Code × analytics — field notes from the Digital Summer Clinic and beyond."
  # site-url is required for the RSS feed and for canonical/OpenGraph URLs.
  # This is a "project site" (repo named `blog`), so it lives under /blog.
  # (No trailing slash.)
  site-url: "https://mattzhou98.github.io/blog"
  repo-url: "https://github.com/mattzhou98/blog"
  favicon: profile.jpg

  # --- Google Analytics (GA4) -------------------------------------------------
  # Replace G-XXXXXXXXXX with YOUR GA4 Measurement ID (see README.md → "Google
  # Analytics"). Quarto auto-injects gtag.js — do NOT add your own gtag snippet
  # or hits will be double-counted. cookie-consent gates GA until the visitor
  # acknowledges the banner.
  google-analytics:
    tracking-id: "G-C3DGYCXYP5"
    anonymize-ip: true
    version: 4
  cookie-consent:
    type: implied
    style: simple
    palette: light
  # ---------------------------------------------------------------------------

  navbar:
    background: primary
    search: true
    pinned: true
    left:
      - text: "Posts"
        href: index.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: rss
        href: index.xml
        aria-label: RSS feed
      - icon: github
        href: https://github.com/mattzhou98
        aria-label: GitHub profile
      - icon: linkedin
        href: https://www.linkedin.com/in/matthewzhou98
        aria-label: LinkedIn profile

  page-footer:
    border: true
    left: "© 2026 Matthew Zhou"
    right: "Built with [Quarto](https://quarto.org) · Hosted on GitHub Pages"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-copy: true
    anchor-sections: true
