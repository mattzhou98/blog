project:
  type: website
  output-dir: _site
  preview:
    port: 4200
    browser: true

website:
  title: "matthew.zhou"
  description: "Code × analytics — field notes from the Digital Summer Clinic and beyond."
  # This is a "project site" (repo named `blog`), so it lives under /blog.
  site-url: "https://mattzhou98.github.io/blog"
  repo-url: "https://github.com/mattzhou98/blog"
  favicon: profile.jpg

  # --- Google Analytics (GA4) -------------------------------------------------
  google-analytics:
    tracking-id: "G-C3DGYCXYP5"
    anonymize-ip: true
    version: 4
  cookie-consent:
    type: implied
    style: simple
    palette: light
  # ---------------------------------------------------------------------------

  navbar:
    background: light
    search: true
    pinned: true
    left:
      - text: "posts"
        href: index.qmd
      - text: "about"
        href: about.qmd
    right:
      - icon: rss
        href: index.xml
        aria-label: RSS feed
      - icon: github
        href: https://github.com/mattzhou98
        aria-label: GitHub profile
      - icon: linkedin
        href: https://www.linkedin.com/in/matthewzhou98
        aria-label: LinkedIn profile

  page-footer:
    border: true
    left: "© 2026 Matthew Zhou"
    right: "Built with [Quarto](https://quarto.org) · Hosted on GitHub Pages"

format:
  html:
    theme: theme.scss
    include-in-header: head.html
    toc: true
    code-copy: true
    anchor-sections: true
    grid:
      body-width: 860px
