name: Publish blog

# Build on every push to main, and allow manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the native GitHub Pages deployment (deploy-pages
# uses OIDC). contents:read is enough to check out the source; the artifact
# pipeline needs pages:write + id-token:write.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight deploy finish so a fast
# follow-up push can't clobber a release that is mid-flight.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      # Installs Quarto in the runner — this is what makes "no local Quarto at
      # deploy time" true. Markdown-only blog: no R/Python/Jupyter needed.
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Quarto's website output dir is _site (set in _quarto.yml).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
