name: Deploy blog (Astro)

# Build on every push to main, and allow manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the native GitHub Pages deployment (deploy-pages uses
# OIDC). contents:read is enough to check out the source; the artifact pipeline
# needs pages:write + id-token:write.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight deploy finish so a fast
# follow-up push can't clobber a release that is mid-flight.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Reproducible install from package-lock.json (no Python step needed — the
      # interactive islands are client-side WebAssembly; nothing is generated at
      # build time).
      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Astro's output dir is dist/ (base path /blog is baked into every URL).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
